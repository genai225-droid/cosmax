<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>패키징 업체 비교 대시보드</title>
<style>
  :root{
    --bg:#FFF6F9;
    --surface:#FFFFFF;
    --ink:#4A3540;
    --muted:#B893A0;
    --border:#F6DCE6;
    --accent:#EE7DA0;
    --accent-dark:#D85C82;
    --accent-light:#FDEAF1;
    --gold:#D9784F;
    --gold-light:#FBEADF;
    --danger:#D1495B;
    --radius:16px;
    --fs-2xs:11px;
    --fs-xs:12px;
    --fs-sm:13px;
    --fs-base:14px;
    --fs-md:15px;
    --fs-lg:16px;
  }
  @media (max-width:520px){
    :root{
      --fs-2xs:12px;
      --fs-xs:13px;
      --fs-sm:14px;
      --fs-base:15px;
      --fs-md:16px;
      --fs-lg:17px;
    }
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:24px 16px 64px;}

  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px;}
  .header-center{
    text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;
    margin-bottom:20px;
  }
  .logo-mark{
    width:42px;height:42px;border-radius:14px;flex-shrink:0;margin-bottom:2px;
    background:linear-gradient(135deg,var(--accent),var(--gold-light));
  }
  .header-center h1{font-size:28px;font-weight:800;margin:0;letter-spacing:-0.3px;}
  .header-center p{margin:0;color:var(--muted);font-size:var(--fs-sm);max-width:520px;}
  @media (max-width:520px){
    .header-center h1{font-size:23px;}
  }
  .header-actions{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap;}
  .btn-ghost{
    background:var(--surface);color:var(--muted);border:1px solid var(--border);border-radius:999px;
    padding:8px 14px;font-size:var(--fs-xs);font-weight:600;cursor:pointer;white-space:nowrap;
    display:inline-block;text-decoration:none;
  }
  .btn-ghost:hover{color:var(--accent-dark);border-color:var(--accent);}

  .cta-row{display:flex;justify-content:center;align-items:center;gap:8px;margin-bottom:20px;}
  .btn-cta{
    background:var(--accent);color:#fff;border:none;border-radius:999px;
    padding:14px 28px;font-size:var(--fs-md);font-weight:800;cursor:pointer;white-space:nowrap;
    display:inline-block;text-decoration:none;text-align:center;
    box-shadow:0 4px 14px rgba(238,125,160,0.35);
    max-width:100%;
  }
  .btn-cta:hover{background:var(--accent-dark);}
  @media (max-width:360px){
    .btn-cta{padding:12px 16px;white-space:normal;}
  }

  .search-row{
    display:flex;align-items:center;gap:8px;margin-bottom:16px;
    background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:11px 18px;
    box-shadow:0 2px 10px rgba(238,125,160,0.08);
  }
  .search-row input{
    flex:1;border:none;outline:none;font-size:var(--fs-md);background:transparent;color:var(--ink);min-width:0;
  }
  .search-icon{color:var(--accent);flex-shrink:0;display:flex;align-items:center;}
  .search-clear{border:none;background:none;color:var(--muted);cursor:pointer;font-size:var(--fs-xs);flex-shrink:0;padding:4px;}
  .search-clear:hover{color:var(--danger);}

  .panel{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:18px 18px;
    margin-bottom:16px;
    box-shadow:0 2px 12px rgba(238,125,160,0.06);
  }
  .panel h2{font-size:var(--fs-base);font-weight:700;margin:0 0 12px;}
  .edit-banner{
    display:none;align-items:center;justify-content:space-between;gap:10px;
    background:var(--gold-light);color:var(--gold);border-radius:10px;padding:8px 14px;
    font-size:var(--fs-sm);margin-bottom:12px;
  }
  .edit-banner.show{display:flex;}
  .edit-banner button{border:none;background:none;color:var(--gold);font-weight:700;cursor:pointer;font-size:var(--fs-xs);padding:6px;}

  .form-grid{
    display:grid;
    grid-template-columns:1.2fr 0.8fr 1.1fr 0.8fr 0.8fr 0.8fr 1.2fr auto;
    gap:10px;
    align-items:end;
  }
  @media (max-width:900px){
    .form-grid{grid-template-columns:1fr 1fr;}
  }
  @media (max-width:520px){
    .form-grid{grid-template-columns:1fr;}
    .btn-add{width:100%;min-height:44px;}
    .field input{min-height:44px;padding:12px;}
  }
  .field label{display:block;font-size:var(--fs-xs);color:var(--muted);margin-bottom:5px;font-weight:600;}
  .field input{
    width:100%;padding:9px 12px;border:1px solid var(--border);
    border-radius:10px;font-size:var(--fs-md);background:var(--surface);color:var(--ink);
  }
  .field input:focus{outline:2px solid var(--accent-light);border-color:var(--accent);}
  .btn-add{
    background:var(--accent);color:#fff;border:none;border-radius:999px;
    padding:10px 20px;font-size:var(--fs-base);font-weight:700;cursor:pointer;white-space:nowrap;
  }
  .btn-add:hover{background:var(--accent-dark);}
  .btn-add:disabled{background:#E9C7D3;cursor:not-allowed;}

  .weight-row{display:flex;gap:24px;flex-wrap:wrap;align-items:center;margin-top:10px;}
  .weight-item{display:flex;flex-direction:column;gap:4px;min-width:150px;flex:1;}
  .weight-item .lbl{font-size:var(--fs-xs);color:var(--muted);display:flex;justify-content:space-between;}
  .weight-item input[type=range]{width:100%;accent-color:var(--accent);}
  .weight-hint{font-size:var(--fs-xs);color:var(--muted);margin-top:8px;line-height:1.5;}

  .tabs-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:0;}
  .tab{
    padding:7px 16px;border-radius:999px;font-size:var(--fs-sm);cursor:pointer;font-weight:600;
    border:1px solid var(--border);background:var(--surface);color:var(--muted);
  }
  .tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}

  .sort-control{display:flex;align-items:center;gap:8px;}
  .sort-control label{font-size:var(--fs-xs);color:var(--muted);font-weight:600;}
  .sort-control select{
    border:1px solid var(--border);border-radius:999px;padding:7px 14px;font-size:var(--fs-sm);
    background:var(--surface);color:var(--ink);cursor:pointer;
  }
  .sort-control select:focus{outline:2px solid var(--accent-light);border-color:var(--accent);}

  .category-block{margin-bottom:20px;}
  .category-title{
    font-size:var(--fs-base);font-weight:700;margin:0 0 8px;color:var(--accent-dark);
    display:flex;align-items:center;gap:8px;
  }
  .category-title .count{font-size:var(--fs-xs);color:var(--muted);font-weight:500;}

  .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:12px;}
  table{width:100%;min-width:620px;border-collapse:collapse;font-size:var(--fs-sm);}
  th{
    text-align:left;padding:8px 10px;color:var(--muted);font-weight:600;
    border-bottom:1px solid var(--border);white-space:nowrap;
  }
  th.sortable{cursor:pointer;user-select:none;}
  th.sortable:hover{color:var(--ink);}
  th.sortable.active{color:var(--accent-dark);}
  td{padding:9px 10px;border-bottom:1px solid var(--border);}
  tr.best td{background:var(--accent-light);}
  tr.best td:first-child{border-left:3px solid var(--accent);border-radius:6px 0 0 6px;}
  .num{font-family:"SFMono-Regular",Menlo,Consolas,monospace;font-size:var(--fs-sm);}
  .badge{
    display:inline-block;background:var(--gold-light);color:var(--gold);
    font-size:var(--fs-2xs);font-weight:700;padding:2px 9px;border-radius:999px;margin-left:6px;
  }
  .row-actions{display:flex;gap:14px;}
  .icon-btn{border:none;background:none;color:var(--muted);cursor:pointer;font-size:var(--fs-xs);padding:4px 6px;font-weight:600;}
  .icon-btn:hover{color:var(--accent);}
  .icon-btn.danger:hover{color:var(--danger);}

  .empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:var(--fs-base);}

  #file-import{display:none;}

  .mascot{display:inline-block;flex-shrink:0;}
  .mascot-sm{width:36px;height:54px;}
  .mascot-md{width:56px;height:84px;}
  .mascot-lg{width:96px;height:144px;}
  .mascot-xs{width:22px;height:33px;vertical-align:middle;margin-right:4px;}

  @media (max-width:520px){
    .btn-ghost, .btn-cta, .tab, .search-clear, .icon-btn, .edit-banner button{
      min-height:44px;display:inline-flex;align-items:center;justify-content:center;
    }
    #sort-select{min-height:44px;padding:13px 16px;}
    .search-row{padding:13px 18px;}
  }
</style>
</head>

    <div class="header-actions">

<script>
const STORAGE_KEY = 'packaging_suppliers_v3';
const LEGACY_KEYS = ['packaging_suppliers_v2', 'packaging_suppliers_v1'];
let entries = [];
let activeTab = '전체';
let searchQuery = '';
let weights = { price: 40, moq: 30, lead: 30 };
let sortMode = 'score'; // score | price_asc | price_desc | moq_asc | moq_desc | lead_asc | lead_desc | vendor_asc | vendor_desc
let editingId = null;

function genId(){ return 'e' + Date.now() + Math.random().toString(36).slice(2,7); }

const CODE_CHARS = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
function genCode(existingCodes){
  let code;
  do{
    code = '';
    for(let i = 0; i < 8; i++){
      code += CODE_CHARS[Math.floor(Math.random() * CODE_CHARS.length)];
    }
  }while(existingCodes && existingCodes.has(code));
  return code;
}

function itemKey(vendor, spec, capacity){ return vendor + '__' + spec + '__' + (capacity || ''); }

function getOrCreateCode(vendor, spec, capacity){
  const key = itemKey(vendor, spec, capacity);
  const existing = entries.find(e => itemKey(e.vendor, e.spec, e.capacity) === key && e.code);
  if(existing) return existing.code;
  const usedCodes = new Set(entries.map(e => e.code).filter(Boolean));
  return genCode(usedCodes);
}

function splitLegacyCategory(str){
  const s = String(str || '');
  const m = s.match(/^(.*?)\s*(\d+(?:\.\d+)?\s?(?:ml|g|kg|l))$/i);
  if(m) return { spec: m[1].trim(), capacity: m[2].trim() };
  return { spec: s.trim(), capacity: '' };
}

function migrateLegacyEntries(){
  for(const key of LEGACY_KEYS){
    const raw = localStorage.getItem(key);
    if(!raw) continue;
    try{
      const old = JSON.parse(raw);
      if(Array.isArray(old) && old.length){
        return old.map(e => {
          const { spec, capacity } = splitLegacyCategory(e.category);
          return {
            id: e.id || genId(),
            code: e.code || '',
            spec, capacity,
            vendor: e.vendor, price: e.price, moq: e.moq, lead: e.lead,
            note: e.note || ''
          };
        });
      }
    }catch(err){ /* ignore malformed legacy data */ }
  }
  return [];
}

function loadEntries(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      entries = JSON.parse(raw);
    }else{
      entries = migrateLegacyEntries();
      if(entries.length) saveEntries();
    }
  }catch(e){
    entries = [];
  }
  render();
}

function saveEntries(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  }catch(e){
    alert('저장에 실패했습니다. 브라우저 저장 공간을 확인해 주세요.');
  }
}

function updateVendorDatalist(){
  const dl = document.getElementById('vendor-datalist');
  const names = new Set(entries.map(e => e.vendor));
  dl.innerHTML = [...names].map(n => `<option value="${escapeHtml(n)}">`).join('');
}

function updateSpecCapacityLists(){
  const specDl = document.getElementById('spec-list');
  const capDl = document.getElementById('capacity-list');
  const specs = new Set(entries.map(e => e.spec));
  const caps = new Set(entries.map(e => e.capacity).filter(Boolean));
  specDl.innerHTML = [...specs].map(s => `<option value="${escapeHtml(s)}">`).join('');
  capDl.innerHTML = [...caps].map(c => `<option value="${escapeHtml(c)}">`).join('');
}

function normalizeWeights(){
  const el = {price: document.getElementById('w-price'), moq: document.getElementById('w-moq'), lead: document.getElementById('w-lead')};
  let vals = {price: +el.price.value, moq: +el.moq.value, lead: +el.lead.value};
  const total = vals.price + vals.moq + vals.lead;
  if(total === 0){ vals = {price:34, moq:33, lead:33}; }
  else{
    ['price','moq','lead'].forEach(k => vals[k] = Math.round(vals[k] / total * 100));
  }
  weights = vals;
  el.price.value = vals.price; el.moq.value = vals.moq; el.lead.value = vals.lead;
  document.getElementById('w-price-val').textContent = vals.price;
  document.getElementById('w-moq-val').textContent = vals.moq;
  document.getElementById('w-lead-val').textContent = vals.lead;
}

function computeScores(group){
  const prices = group.map(e => e.price);
  const moqs = group.map(e => e.moq);
  const leads = group.map(e => e.lead);
  const minP = Math.min(...prices), maxP = Math.max(...prices);
  const minM = Math.min(...moqs), maxM = Math.max(...moqs);
  const minL = Math.min(...leads), maxL = Math.max(...leads);
  function norm(val, min, max){
    if(max === min) return 1;
    return 1 - (val - min) / (max - min);
  }
  return group.map(e => {
    const sp = norm(e.price, minP, maxP);
    const sm = norm(e.moq, minM, maxM);
    const sl = norm(e.lead, minL, maxL);
    const score = sp * weights.price + sm * weights.moq + sl * weights.lead;
    return { ...e, score };
  });
}

function renderTabs(){
  const specs = ['전체', ...new Set(entries.map(e => e.spec))];
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  specs.forEach(spec => {
    const div = document.createElement('div');
    div.className = 'tab' + (spec === activeTab ? ' active' : '');
    div.textContent = spec;
    div.onclick = () => { activeTab = spec; render(); };
    tabsEl.appendChild(div);
  });
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function matchesSearch(e, q){
  if(!q) return true;
  const needle = q.trim().toLowerCase();
  return [e.code, e.vendor, e.spec, e.capacity, e.note].some(v => (v || '').toLowerCase().includes(needle));
}

function groupKeyOf(e){ return e.spec + ' ' + (e.capacity || ''); }
function groupLabelOf(e){ return e.capacity ? `${e.spec} · ${e.capacity}` : e.spec; }

function sortHeaderLabel(key, label){
  const isAsc = sortMode === key + '_asc';
  const isDesc = sortMode === key + '_desc';
  const active = isAsc || isDesc;
  const arrow = isAsc ? ' ▲' : isDesc ? ' ▼' : '';
  return `<th class="sortable${active ? ' active' : ''}" data-sort="${key}">${label}${arrow}</th>`;
}

function applySort(list){
  switch(sortMode){
    case 'price_asc': return [...list].sort((a,b) => a.price - b.price);
    case 'price_desc': return [...list].sort((a,b) => b.price - a.price);
    case 'moq_asc': return [...list].sort((a,b) => a.moq - b.moq);
    case 'moq_desc': return [...list].sort((a,b) => b.moq - a.moq);
    case 'lead_asc': return [...list].sort((a,b) => a.lead - b.lead);
    case 'lead_desc': return [...list].sort((a,b) => b.lead - a.lead);
    case 'vendor_asc': return [...list].sort((a,b) => a.vendor.localeCompare(b.vendor, 'ko'));
    case 'vendor_desc': return [...list].sort((a,b) => b.vendor.localeCompare(a.vendor, 'ko'));
    default: return [...list].sort((a,b) => b.score - a.score);
  }
}

function toggleSort(key){
  sortMode = sortMode === key + '_asc' ? key + '_desc' : key + '_asc';
  document.getElementById('sort-select').value = sortMode;
  render();
}

function updateCategorySelect(){
  const specs = ['전체', ...new Set(entries.map(e => e.spec))];
  const sel = document.getElementById('category-select');
  sel.innerHTML = specs.map(s => `<option value="${s}">${s === '전체' ? '전체보기' : s}</option>`).join('');
  sel.value = activeTab;
}

  updateCategorySelect();
  updateSpecCapacityLists();

  groupKeys.forEach(gk => {
    const group = relevant.filter(e => groupKeyOf(e) === gk);
    if(group.length === 0) return;
    let scored = computeScores(group);
    const bestId = [...scored].sort((a,b) => b.score - a.score)[0].id;
    scored = applySort(scored);

    const block = document.createElement('div');
    block.className = 'category-block';
    block.innerHTML = `
      <div class="category-title">${escapeHtml(groupLabelOf(group[0]))} <span class="count">(${group.length}개 업체)</span></div>
      <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>코드</th>
            <th>사양</th>
            <th>용량</th>
            ${sortHeaderLabel('vendor', '업체명')}
            ${sortHeaderLabel('price', '단가(원)')}
            ${sortHeaderLabel('moq', 'MOQ(개)')}
            ${sortHeaderLabel('lead', '리드타임(일)')}
            <th>비고</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${scored.map(e => `
            <tr class="${e.id === bestId ? 'best' : ''}">
              <td class="num">${escapeHtml(e.code || '-')}</td>
              <td>${escapeHtml(e.spec)}</td>
              <td>${escapeHtml(e.capacity || '-')}</td>
              <td>${escapeHtml(e.vendor)}${e.id === bestId ? '<span class="badge">최적</span>' : ''}</td>
              <td class="num">${e.price.toLocaleString()}</td>
              <td class="num">${e.moq.toLocaleString()}</td>
              <td class="num">${e.lead}</td>
              <td>${escapeHtml(e.note || '-')}</td>
              <td>
                <div class="row-actions">
                  <button class="icon-btn" data-edit="${e.id}">수정</button>
                  <button class="icon-btn danger" data-del="${e.id}">삭제</button>
                </div>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
      </div>
    `;
    content.appendChild(block);
  });

  content.querySelectorAll('[data-del]').forEach(btn => {
    btn.onclick = () => {
      const id = btn.getAttribute('data-del');
      if(!confirm('이 항목을 삭제하시겠습니까?')) return;
      entries = entries.filter(e => e.id !== id);
      if(editingId === id) exitEditMode();
      saveEntries();
      render();
    };
  });

  content.querySelectorAll('[data-edit]').forEach(btn => {
    btn.onclick = () => {
      const id = btn.getAttribute('data-edit');
      enterEditMode(id);
    };
  });

  content.querySelectorAll('th.sortable').forEach(th => {
    th.onclick = () => {
      const key = th.getAttribute('data-sort');
      toggleSort(key);
    };
  });
}

function enterEditMode(id){
  const e = entries.find(x => x.id === id);
  if(!e) return;
  editingId = id;
  document.getElementById('in-spec').value = e.spec;
  document.getElementById('in-capacity').value = e.capacity || '';
  document.getElementById('in-vendor').value = e.vendor;
  document.getElementById('in-price').value = e.price;
  document.getElementById('in-moq').value = e.moq;
  document.getElementById('in-lead').value = e.lead;
  document.getElementById('in-note').value = e.note || '';
  document.getElementById('edit-banner').classList.add('show');
  document.getElementById('btn-add').textContent = '수정 완료';
  document.getElementById('in-spec').focus();
}

function exitEditMode(){
  editingId = null;
  document.getElementById('edit-banner').classList.remove('show');
  document.getElementById('btn-add').textContent = '추가';
  clearForm();
}

function clearForm(){
  document.getElementById('in-spec').value = '';
  document.getElementById('in-capacity').value = '';
  document.getElementById('in-vendor').value = '';
  document.getElementById('in-price').value = '';
  document.getElementById('in-moq').value = '';
  document.getElementById('in-lead').value = '';
  document.getElementById('in-note').value = '';
}

function submitForm(){
  const spec = document.getElementById('in-spec').value.trim();
  const capacity = document.getElementById('in-capacity').value.trim();
  const vendor = document.getElementById('in-vendor').value.trim();
  const price = parseFloat(document.getElementById('in-price').value);
  const moq = parseFloat(document.getElementById('in-moq').value);
  const lead = parseFloat(document.getElementById('in-lead').value);
  const note = document.getElementById('in-note').value.trim();

  if(!spec || !vendor || isNaN(price) || isNaN(moq) || isNaN(lead)){
    alert('사양, 업체명, 단가, MOQ, 리드타임을 모두 입력해 주세요.');
    return;
  }

  const btn = document.getElementById('btn-add');
  const wasEditing = !!editingId;
  btn.disabled = true;
  btn.textContent = wasEditing ? '수정 중...' : '추가 중...';

  setTimeout(() => {
    if(wasEditing){
      const e = entries.find(x => x.id === editingId);
      if(e){
        e.spec = spec; e.capacity = capacity; e.vendor = vendor; e.price = price; e.moq = moq; e.lead = lead; e.note = note;
      }
      exitEditMode();
      activeTab = spec;
    }else{
      const code = getOrCreateCode(vendor, spec, capacity);
      entries.push({ id: genId(), code, spec, capacity, vendor, price, moq, lead, note });
      clearForm();
      activeTab = spec;
    }
    saveEntries();
    render();
    btn.disabled = false;
    btn.textContent = '추가';
  }, 350);
}

document.getElementById('file-import').addEventListener('change', (ev) => {
  const file = ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const imported = JSON.parse(reader.result);
      if(!Array.isArray(imported)) throw new Error('invalid format');
      const valid = imported.every(item => (('spec' in item) || ('category' in item)) && 'vendor' in item && 'price' in item && 'moq' in item && 'lead' in item);
      if(!valid) throw new Error('invalid fields');
      if(!confirm(`${imported.length}개 항목을 가져옵니다. 기존 데이터에 추가됩니다. 계속할까요?`)) return;
      const usedCodes = new Set(entries.map(e => e.code).filter(Boolean));
      imported.forEach(item => {
        let spec, capacity;
        if('spec' in item){
          spec = String(item.spec);
          capacity = item.capacity ? String(item.capacity) : '';
        }else{
          const split = splitLegacyCategory(item.category);
          spec = split.spec; capacity = split.capacity;
        }
        const code = item.code && !usedCodes.has(item.code) ? item.code : genCode(usedCodes);
        usedCodes.add(code);
        entries.push({
          id: genId(),
          code,
          spec, capacity,
          vendor: String(item.vendor),
          price: parseFloat(item.price),
          moq: parseFloat(item.moq),
          lead: parseFloat(item.lead),
          note: item.note ? String(item.note) : ''
        });
      });
      saveEntries();
      activeTab = '전체';
      render();
    }catch(e){
      alert('파일을 읽을 수 없습니다. 이 대시보드에서 내보낸 JSON 파일인지 확인해 주세요.');
    }
    ev.target.value = '';
  };
  reader.readAsText(file);
});

function randInt(min, max){ return Math.round(min + Math.random() * (max - min)); }

function randMoq(min, max){
  const lo = Math.ceil(Math.max(3000, min) / 500) * 500;
  const hi = Math.max(lo, Math.floor(max / 500) * 500);
  return lo + randInt(0, (hi - lo) / 500) * 500;
}

function randLead(min, max){
  const lo = Math.max(15, min);
  const hi = Math.max(lo, max);
  return randInt(lo, hi);
}

      moq: randMoq(item.moq[0], item.moq[1]),
      lead: randLead(item.lead[0], item.lead[1]),

  render();
